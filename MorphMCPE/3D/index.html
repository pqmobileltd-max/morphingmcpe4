<style>
    
.center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

</style>
<body>
    <canvas class="center" id="skin_container"></canvas>
    <script src="./skinview3d.bundle.js"></script>
<script>
    
    var skinViewer = new skinview3d.SkinViewer()
    
    let primaryAnimation;
    
    let type = "cape"
    
    //let WalkingAnimation = skinview3d.WalkingAnimation;
    //let RunningAnimation = skinview3d.RunningAnimation;
    //let FlyingAnimation = skinview3d.FlyingAnimation;
    
    
    var skin = new Image();
    skin.crossOrigin = '';
    
    var cape = new Image();
    cape.crossOrigin = '';
    
    
    skin.onload = function() {
        console.log("Loaded Image");
    }

    function loadSkin(path){
        skin.src = path;
        skinViewer.loadSkin(path)
    }

    function loadCape(path){
        cape.src = path;
        skinViewer.loadCape(path,{ backEquipment: type })
    }

    function run(){
 
        primaryAnimation.resetAndRemove();
        
        // And run for now!
        let run = skinViewer.animations.add(skinview3d.RunningAnimation);

        // Set the speed of an animation
        run.speed = 0.3;
        // Pause single animation
        run.paused = false;
        // Pause all animations!
        skinViewer.animations.paused = false;
        
        primaryAnimation = run
    }

    function fly(){
        
        primaryAnimation.resetAndRemove();
        
        let fly = skinViewer.animations.add(skinview3d.FlyingAnimation);
        fly.paused = false;
        skinViewer.animations.paused = false;
        
        primaryAnimation = fly
    }

    function reloadCape(){
        skinViewer.loadCape(null);
        type = "cape"
        skinViewer.loadCape(cape.src,{ backEquipment: type })
    }

    function reloadElytra(){
        skinViewer.loadCape(null);
        type = "elytra"
        skinViewer.loadCape(cape.src,{ backEquipment: type })
    }
    
    function rotate(){
        let rotate = skinViewer.animations.add(skinview3d.RotatingAnimation);
    }
